<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>منهج الفقه — أبو يوسف</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#08080f;--s1:#0f0f1a;--s2:#141420;--border:#22223a;
  --gold:#c9a84c;--gold2:#e8c870;--goldf:rgba(201,168,76,0.1);
  --text:#ddddf0;--muted:#606080;--white:#f0f0ff;
  --green:#3db87a;--red:#e05060;--blue:#4a7fe0;--teal:#3ca8b8;
  --nav:68px;
}
html,body{background:var(--bg);color:var(--text);font-family:'Tajawal',sans-serif;min-height:100vh;overflow-x:hidden}

/* ── SCREENS ── */
.sc{display:none;min-height:100vh;padding-bottom:calc(var(--nav)+16px)}
.sc.on{display:block}

/* ── NAV ── */
.nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav);background:#0b0b14;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-around;z-index:100;backdrop-filter:blur(10px)}
.nb{display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 10px;border:none;background:transparent;cursor:pointer;min-width:52px}
.nb .ni{font-size:20px}
.nb .nl{font-size:10px;color:var(--muted);font-family:'Tajawal',sans-serif;font-weight:600}
.nb.on .nl{color:var(--gold)}

/* ── HOME ── */
.home-hero{
  padding:52px 20px 28px;
  text-align:center;
  position:relative;
  overflow:hidden;
}
.home-hero::before{
  content:'';position:absolute;top:-40px;left:50%;transform:translateX(-50%);
  width:300px;height:300px;border-radius:50%;
  background:radial-gradient(circle,rgba(201,168,76,.12) 0%,transparent 70%);
  pointer-events:none;
}
.hero-icon{
  width:90px;height:90px;border-radius:50%;
  background:linear-gradient(135deg,#1a1a2e,#252540);
  border:2px solid rgba(201,168,76,.3);
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 20px;
  font-size:42px;
  box-shadow:0 0 40px rgba(201,168,76,.15);
}
.hero-title{font-family:'Amiri',serif;font-size:30px;color:var(--white);line-height:1.4;margin-bottom:6px}
.hero-title span{color:var(--gold)}
.hero-sub{font-size:13px;color:var(--muted);margin-bottom:28px}
.progress-ring{display:flex;align-items:center;justify-content:center;gap:8px;background:var(--goldf);border:1px solid rgba(201,168,76,.2);border-radius:100px;padding:8px 18px;margin:0 auto;width:fit-content;font-size:13px;color:var(--gold);font-weight:700}

/* HOME GRID */
.sec-grid{display:flex;flex-direction:column;gap:10px;padding:16px 14px 0}
.sec-card{
  background:var(--s1);
  border:1px solid var(--border);
  border-radius:18px;
  padding:18px 18px;
  cursor:pointer;
  display:flex;align-items:center;gap:16px;
  transition:all .18s;
  position:relative;overflow:hidden;
}
.sec-card::before{content:'';position:absolute;right:0;top:0;bottom:0;width:3px;border-radius:0 18px 18px 0}
.sec-card:active{transform:scale(.98)}
.sc-num{
  width:44px;height:44px;border-radius:12px;
  background:var(--s2);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;
}
.sc-info{flex:1}
.sc-title{font-size:16px;font-weight:800;color:var(--white);margin-bottom:2px}
.sc-sub{font-size:12px;color:var(--muted)}
.sc-arrow{color:var(--border);font-size:16px}
.sc-done{width:22px;height:22px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;font-size:11px;color:white;flex-shrink:0}

/* card accent colors */
.a1::before{background:var(--gold)} .a1 .sc-num{border-color:rgba(201,168,76,.3);color:var(--gold)}
.a2::before{background:#3db87a} .a2 .sc-num{border-color:rgba(61,184,122,.3);color:#3db87a}
.a3::before{background:#a064f0} .a3 .sc-num{border-color:rgba(160,100,240,.3);color:#a064f0}
.a4::before{background:#4a7fe0} .a4 .sc-num{border-color:rgba(74,127,224,.3);color:#4a7fe0}
.a5::before{background:#e0903c} .a5 .sc-num{border-color:rgba(224,144,60,.3);color:#e0903c}
.a6::before{background:#e05060} .a6 .sc-num{border-color:rgba(224,80,96,.3);color:#e05060}
.a7::before{background:#3ca8b8} .a7 .sc-num{border-color:rgba(60,168,184,.3);color:#3ca8b8}
.a8::before{background:#c8a050} .a8 .sc-num{border-color:rgba(200,160,80,.3);color:#c8a050}
.a9::before{background:#64a0dc} .a9 .sc-num{border-color:rgba(100,160,220,.3);color:#64a0dc}
.a10::before{background:#f064a0} .a10 .sc-num{border-color:rgba(240,100,160,.3);color:#f064a0}

/* ── SECTION DETAIL ── */
.det-head{display:flex;align-items:center;gap:12px;padding:52px 18px 0}
.back{width:40px;height:40px;border-radius:12px;border:1px solid var(--border);background:var(--s1);color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.back:active{transform:scale(.92)}
.det-head-info{}
.det-num{font-size:11px;color:var(--gold);font-weight:700;letter-spacing:2px;margin-bottom:2px}
.det-title{font-size:20px;font-weight:900;color:var(--white)}

/* SVG illustration area */
.illus-wrap{margin:20px 14px 0;border-radius:20px;overflow:hidden;background:var(--s1);border:1px solid var(--border)}
.illus-inner{padding:24px;display:flex;align-items:center;justify-content:center}

/* content blocks */
.det-body{padding:16px 14px;display:flex;flex-direction:column;gap:12px}
.block{background:var(--s1);border:1px solid var(--border);border-radius:16px;padding:18px;animation:up .28s ease both}
@keyframes up{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.block:nth-child(2){animation-delay:.05s}.block:nth-child(3){animation-delay:.1s}.block:nth-child(4){animation-delay:.15s}.block:nth-child(5){animation-delay:.2s}.block:nth-child(6){animation-delay:.25s}.block:nth-child(7){animation-delay:.3s}.block:nth-child(8){animation-delay:.35s}

.bhead{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.bico{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.btitle{font-size:15px;font-weight:800;color:var(--white)}
.btext{font-size:14px;line-height:1.85;color:#b8b8d0}

/* numbered list */
.nlist{display:flex;flex-direction:column;gap:8px;margin-top:4px}
.ni-row{display:flex;gap:12px;align-items:flex-start}
.ni-num{width:26px;height:26px;border-radius:8px;background:var(--goldf);border:1px solid rgba(201,168,76,.2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:var(--gold);flex-shrink:0;margin-top:2px}
.ni-text{font-size:14px;line-height:1.8;color:#b8b8d0;flex:1}
.ni-text strong{color:var(--white)}

/* tag pills */
.pills{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.pill{background:var(--goldf);border:1px solid rgba(201,168,76,.2);border-radius:100px;padding:5px 14px;font-size:12px;color:var(--gold);font-weight:700}
.pill.green{background:rgba(61,184,122,.1);border-color:rgba(61,184,122,.25);color:#3db87a}
.pill.red{background:rgba(224,80,96,.1);border-color:rgba(224,80,96,.25);color:#e05060}
.pill.blue{background:rgba(74,127,224,.1);border-color:rgba(74,127,224,.25);color:#4a7fe0}

/* warning / tip box */
.tip{background:rgba(201,168,76,.07);border:1px solid rgba(201,168,76,.2);border-radius:12px;padding:14px;font-size:13px;color:#d8c880;line-height:1.7;margin-top:4px}
.tip strong{color:var(--gold)}
.warn{background:rgba(224,80,96,.07);border:1px solid rgba(224,80,96,.2);border-radius:12px;padding:14px;font-size:13px;color:#e8a0a8;line-height:1.7;margin-top:4px}
.warn strong{color:#e05060}

/* compare table */
.ctable{width:100%;border-collapse:collapse;margin-top:8px}
.ctable th{background:var(--goldf);color:var(--gold);font-size:13px;padding:10px 12px;text-align:right;font-weight:700}
.ctable td{padding:10px 12px;font-size:13px;color:#b8b8d0;border-top:1px solid var(--border)}
.ctable tr:hover td{background:rgba(255,255,255,.02)}

/* done btn */
.done-btn{
  margin:16px 14px 0;width:calc(100% - 28px);padding:16px;
  border-radius:14px;border:none;
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:#060610;font-family:'Tajawal',sans-serif;font-size:16px;font-weight:900;
  cursor:pointer;
}
.done-btn:active{transform:scale(.98)}

::-webkit-scrollbar{width:2px}::-webkit-scrollbar-thumb{background:var(--border)}
</style>
</head>
<body>

<!-- ░░ HOME ░░ -->
<div id="sc-home" class="sc on">
  <div class="home-hero">
    <div class="hero-icon">🕌</div>
    <div class="hero-title">منهج <span>الفقه</span> الكامل</div>
    <div class="hero-sub">حسب رأي السيد السيستاني دام ظله</div>
    <div class="progress-ring">
      <span>📚</span>
      <span id="prog-txt">١٠ مراحل · ابدأ رحلتك</span>
    </div>
  </div>
  <div class="sec-grid" id="sec-grid"></div>
</div>

<!-- ░░ DETAIL ░░ -->
<div id="sc-det" class="sc">
  <div class="det-head">
    <button class="back" onclick="go_home()">◄</button>
    <div class="det-head-info">
      <div class="det-num" id="d-num"></div>
      <div class="det-title" id="d-title"></div>
    </div>
  </div>
  <div class="illus-wrap"><div class="illus-inner" id="d-illus"></div></div>
  <div class="det-body" id="d-body"></div>
  <button class="done-btn" id="d-done" onclick="mark_done()">✓ أكملت هذه المرحلة</button>
</div>

<!-- NAV -->
<nav class="nav">
  <button class="nb on" id="nv-home" onclick="go_home()"><span class="ni">🏠</span><span class="nl">الرئيسية</span></button>
  <button class="nb"    id="nv-det"  onclick="void 0">  <span class="ni">📖</span><span class="nl">المرحلة</span></button>
  <button class="nb"    onclick="scroll_top()">          <span class="ni">☝️</span><span class="nl">للأعلى</span></button>
</nav>

// ════════════════════════════════════
// STATE
// ════════════════════════════════════
const done = new Set(JSON.parse(localStorage.getItem('fiqh_done')||'[]'));
let current = null;

// ════════════════════════════════════
// RENDER HOME
// ════════════════════════════════════
function render_home(){
  const grid = document.getElementById('sec-grid');
  grid.innerHTML = SECS.map(s=>`
    <div class="sec-card ${s.acc}" onclick="open_sec(${s.id})">
      <div class="sc-num">${s.icon}</div>
      <div class="sc-info">
        <div class="sc-title">المرحلة ${s.id}: ${s.title}</div>
        <div class="sc-sub">${s.sub}</div>
      </div>
      ${done.has(s.id)?'<div class="sc-done">✓</div>':'<div class="sc-arrow">◄</div>'}
    </div>`).join('');

  const n = done.size;
  document.getElementById('prog-txt').textContent =
    n===0 ? '١٠ مراحل · ابدأ رحلتك' :
    n===10 ? '١٠/١٠ أكملت المنهج 🎉' :
    `${n}/١٠ مراحل مكتملة`;
}

// ════════════════════════════════════
// OPEN SECTION
// ════════════════════════════════════
function open_sec(id){
  current = id;
  const s = SECS.find(x=>x.id===id);
  document.getElementById('d-num').textContent = `المرحلة ${s.id} من ١٠`;
  document.getElementById('d-title').textContent = s.title;
  document.getElementById('d-illus').innerHTML = s.svg;

  const doneBtn = document.getElementById('d-done');
  if(done.has(id)){
    doneBtn.textContent = '✓ مكتملة — إعادة تحديد';
    doneBtn.style.background = 'linear-gradient(135deg,#1a3a2a,#2a4a3a)';
    doneBtn.style.color = '#3db87a';
    doneBtn.style.border = '1px solid #3db87a';
  } else {
    doneBtn.textContent = '✓ أكملت هذه المرحلة';
    doneBtn.style.background = 'linear-gradient(135deg,#c9a84c,#e8c870)';
    doneBtn.style.color = '#060610';
    doneBtn.style.border = 'none';
  }

  // render blocks
  document.getElementById('d-body').innerHTML = s.blocks.map((b,i)=>{
    let inner = `<div class="bhead"><div class="bico" style="background:${b.icoColor}22;color:${b.icoColor}">${b.ico}</div><div class="btitle">${b.title}</div></div>`;
    if(b.text) inner += `<div class="btext">${b.text}</div>`;
    if(b.list) inner += `<div class="nlist">${b.list.map(li=>`<div class="ni-row"><div class="ni-num">${li.n}</div><div class="ni-text">${li.t}</div></div>`).join('')}</div>`;
    if(b.pills) inner += `<div class="pills">${b.pills.map(p=>`<span class="pill">${p}</span>`).join('')}</div>`;
    if(b.tip) inner += `<div class="tip">${b.tip}</div>`;
    if(b.warn) inner += `<div class="warn">${b.warn}</div>`;
    if(b.table){
      inner += `<table class="ctable"><thead><tr>${b.table.heads.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${b.table.rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</tbody></table>`;
    }
    return `<div class="block" style="animation-delay:${i*.06}s">${inner}</div>`;
  }).join('');

  show('det');
  document.getElementById('nv-det').classList.add('on');
  document.getElementById('nv-home').classList.remove('on');
  window.scrollTo(0,0);
}

// ════════════════════════════════════
// MARK DONE
// ════════════════════════════════════
function mark_done(){
  if(done.has(current)) done.delete(current);
  else done.add(current);
  localStorage.setItem('fiqh_done', JSON.stringify([...done]));

  // move to next or home
  if(!done.has(current)){
    // unmarked — just update button
    open_sec(current);
    return;
  }
  const next = SECS.find(s=>s.id > current && !done.has(s.id));
  if(next) open_sec(next.id);
  else go_home();
}

// ════════════════════════════════════
// NAVIGATION
// ════════════════════════════════════
function show(id){
  document.querySelectorAll('.sc').forEach(s=>s.classList.remove('on'));
  document.getElementById('sc-'+id).classList.add('on');
  window.scrollTo(0,0);
}
function go_home(){
  render_home();
  show('home');
  document.getElementById('nv-home').classList.add('on');
  document.getElementById('nv-det').classList.remove('on');
}
function scroll_top(){window.scrollTo({top:0,behavior:'smooth'});}

// ════════════════════════════════════
// INIT
// ════════════════════════════════════
render_home();
</script>
</body>
</html>
